<svg width="520" height="440" viewBox="0 0 520 440" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Mutaxassis ishlov bermoqda">
  <defs>
    <linearGradient id="wBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eaf6f0"/>
      <stop offset="1" stop-color="#f7fbf9"/>
    </linearGradient>
  </defs>
  <rect x="20" y="20" width="480" height="400" rx="24" fill="url(#wBg)"/>

  <!-- worker -->
  <g transform="translate(150 90)">
    <!-- head + mask -->
    <circle cx="90" cy="60" r="42" fill="#ffffff" stroke="#08090a" stroke-width="2.5"/>
    <path d="M52 60 a38 38 0 0 0 76 0 Z" fill="#0c8c5e"/>
    <rect x="66" y="46" width="48" height="10" rx="5" fill="#08090a"/>
    <!-- body / suit -->
    <path d="M42 210 C42 150 60 118 90 118 C120 118 138 150 138 210 Z" fill="#ffffff" stroke="#08090a" stroke-width="2.5"/>
    <path d="M90 118 L90 210" stroke="#e3ece8" stroke-width="2"/>
    <circle cx="90" cy="150" r="4" fill="#0c8c5e"/>
    <circle cx="90" cy="170" r="4" fill="#0c8c5e"/>
    <!-- arm + sprayer -->
    <path d="M132 150 L185 175" stroke="#08090a" stroke-width="14" stroke-linecap="round"/>
    <rect x="182" y="150" width="20" height="46" rx="4" fill="#0c8c5e"/>
    <rect x="190" y="132" width="6" height="24" rx="3" fill="#08090a"/>
    <!-- spray -->
    <g fill="#12a06e" opacity="0.7">
      <circle cx="216" cy="150" r="3"/><circle cx="228" cy="142" r="2.5"/><circle cx="230" cy="160" r="2.5"/>
      <circle cx="244" cy="150" r="2"/><circle cx="242" cy="134" r="2"/><circle cx="248" cy="166" r="2"/>
    </g>
  </g>

  <!-- floating check chips -->
  <g transform="translate(60 300)">
    <rect width="150" height="40" rx="20" fill="#ffffff" stroke="#dddddd"/>
    <circle cx="24" cy="20" r="10" fill="#0c8c5e"/>
    <path d="M19 20 l4 4 l7 -8" stroke="#fff" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="44" y="14" width="90" height="12" rx="6" fill="#e9efec"/>
  </g>
  <g transform="translate(300 340)">
    <rect width="150" height="40" rx="20" fill="#ffffff" stroke="#dddddd"/>
    <circle cx="24" cy="20" r="10" fill="#0c8c5e"/>
    <path d="M19 20 l4 4 l7 -8" stroke="#fff" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="44" y="14" width="90" height="12" rx="6" fill="#e9efec"/>
  </g>
</svg>
